services:
  - type: web
    name: alphapick
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FINNHUB_KEY
        sync: false
      - key: ALPHA_VANTAGE_KEY
        sync: false
